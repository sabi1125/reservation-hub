version: "3.7"
volumes:
  node_modules:
  postgres-data:

services:
  # server
  server:
    build:
      context: .
      dockerfile: docker/server/Dockerfile
    container_name: reshub
    environment:
      - NODE_ENV=development
      - COMMAND=${COMMAND:-serve}
    env_file:
      - reshub-deploy/.env.dev
    image: reshub:latest
    ports:
      - 8090:8090
      - 5555:5555 # prisma studio port
    volumes:
      - ./app:/app
    tty: true
    depends_on:
      - postgresql

  #test
  test:
    build:
      context: .
      dockerfile: docker/test/Dockerfile
    container_name: reshub-test
    environment:
      - NODE_ENV=development
      - COMMAND=${COMMAND:-test}
    env_file:
      - reshub-deploy/.env.test
    volumes:
      - node_modules:/app/node_modules
    depends_on:
      - testdb

  # prd
  production:
    build:
      context: .
      dockerfile: docker/production/Dockerfile
    container_name: reshub-server_prd
    environment:
      - NODE_ENV=production
      - COMMAND=${COMMAND:-start}
    env_file:
      - reshub-deploy/.env.production
    image: reshub_prd
    ports:
      - 8091:8090
    depends_on:
      - postgresql

  postgresql:
    image: postgres:12
    container_name: reshub-db
    ports:
      - 5432:5432
    volumes:
      - postgres-data:/var/lib/postgresql/data
    env_file:
      - reshub-deploy/.env.dev

  testdb:
    image: postgres:12
    container_name: testdb
    ports:
      - 5432
    env_file:
      - reshub-deploy/.env.test
